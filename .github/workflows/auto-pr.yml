name: Auto PR → main

on:
  push:
    branches: [dev]

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gather commit log since main
        id: meta
        run: |
          COUNT=$(git log origin/main..HEAD --oneline | wc -l | tr -d ' ')
          LOG=$(git log origin/main..HEAD --oneline --no-decorate | head -30)
          LAST=$(git log -1 --pretty=%s)
          echo "count=$COUNT"  >> $GITHUB_OUTPUT
          echo "last=$LAST"    >> $GITHUB_OUTPUT
          echo "log<<EOF"      >> $GITHUB_OUTPUT
          echo "$LOG"          >> $GITHUB_OUTPUT
          echo "EOF"           >> $GITHUB_OUTPUT

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --head dev --base main --json number --jq '.[0].number // empty')
          COUNT="${{ steps.meta.outputs.count }}"
          LAST="${{ steps.meta.outputs.last }}"
          LOG="${{ steps.meta.outputs.log }}"

          if [ "$COUNT" -eq 1 ]; then
            TITLE="$LAST"
          else
            TITLE="dev -> main ($COUNT commits)"
          fi

          printf '## Changes (%s commit(s))\n\n```\n%s\n```\n\n---\nCI runs on this PR. Review and merge when CI is green.\n' \
            "$COUNT" "$LOG" > /tmp/pr_body.md

          if [ -z "$EXISTING" ]; then
            URL=$(gh pr create --base main --head dev --title "$TITLE" --body-file /tmp/pr_body.md)
            echo "PR created: $URL"
          else
            gh pr edit "$EXISTING" --title "$TITLE" --body-file /tmp/pr_body.md
            echo "PR #$EXISTING updated"
          fi
