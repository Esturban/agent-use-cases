name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint examples/
        run: ruff check examples/ --select E,F,W --ignore E501

      - name: Check imports parse
        run: python -m compileall examples/ -q
